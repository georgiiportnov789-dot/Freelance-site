<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKILLFORGE - Создание задания</title>
    <link rel="stylesheet" href="../static/css/often_obj.css" />
    <link rel="stylesheet" href="../static/css/add_task.css" />

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <main class="task-create-layout">
      <div class="task-form-container">
        <button type="button" class="task-form__back-btn">
          <span class="task-form__back-icon">←</span> Назад
        </button>

        <form
          class="task-form"
          id="taskForm"
          hx-post="/tasks/create"
          hx-encoding="multipart/form-data"
          hx-target="this"
          hx-swap="outerHTML"
        >
          <div class="task-media">
            <label class="task-media__add-label">
              <input
                type="file"
                name="photos"
                class="task-media__file-input"
                accept="image/*"
                multiple
                id="fileInput"
              />
              <div class="task-media__add-btn">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M12 5V19M5 12H19"
                    stroke="#ffffff"
                    stroke-width="2.5"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
            </label>

            <button type="button" class="task-media__delete-btn" id="deleteBtn">
              Удалить
            </button>

            <div class="task-media__slider" id="sliderContainer">
              <div class="task-media__slide task-media__slide--placeholder">
                <img
                  src="../static/media/sistem-media/Image.png"
                  alt="Заглушка"
                  class="task-media__image"
                />
              </div>
            </div>

            <div class="task-media__pagination" id="paginationContainer">
              <span class="task-media__dot task-media__dot--active"></span>
            </div>
          </div>

          <div class="task-form__group">
            <input
              type="text"
              name="title"
              class="task-form__input"
              placeholder="Заголовок задачи"
              required
            />
          </div>

          <div class="task-form__row">
            <div class="task-form__group">
              <input
                type="text"
                name="cost"
                class="task-form__input"
                placeholder="Крайняя цена"
                required
              />
            </div>
            <div class="task-form__group">
              <input
                type="date"
                name="deadline"
                class="task-form__input task-form__input--date"
                required
              />
            </div>
          </div>

          <div class="task-form__group">
            <textarea
              name="description"
              class="task-form__textarea"
              placeholder="Описание задачи"
              required
            ></textarea>
          </div>

          <button type="submit" class="task-form__submit-btn">
            Опубликовать задание
          </button>
        </form>
      </div>
    </main>

    <script src="../static/js/slider.js"></script>
    <script src="../static/js/calendar.js"></script>
  </body>
</html>
