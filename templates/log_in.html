<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Войти в аккаунт</title>
  <link rel="stylesheet" href="../static/css/log_in.css">
  
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="login-window">
    <h1 class="login-window__title">Войти в аккаунт</h1>

    <form hx-post="/login" hx-target="#login-result" hx-swap="innerHTML">
        <div class="login-window__field">
        <label class="login-window__label" for="email">Почта</label>
        <input class="login-window__input" type="email" id="email" name="email" placeholder="Введите почту" required />
        </div>

        <div class="login-window__field">
        <div class="login-window__label-row">
            <label class="login-window__label" for="password">Пароль</label>
            <a href="#" class="login-window__forgot">Забыли пароль?</a>
        </div>
        <input class="login-window__input" type="password" id="password" name="password" placeholder="Введите пароль" required />
        </div>

        <div id="login-result" style="margin-bottom: 15px; text-align: center;"></div>

        <div class="login-window__actions">
        <button class="login-window__submit" type="submit">Войти</button>
        
        <button class="login-window__yandex" type="button" title="Войти через Яндекс">
            <img src="../static/media/sistem-media/yandex.png" alt="Яндекс" class="login-window__yandex-icon" />
        </button>
        </div>
    </form>

    <p class="login-window__footer">
        <span class="login-window__footer-text">Нет аккаунта?</span> 
        <a class="login-window__link" href="/register">Регистрация</a>
    </p>
    </div>
</body>
</html>
