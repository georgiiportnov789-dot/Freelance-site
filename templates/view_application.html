<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/design_token.css" />
    <link rel="stylesheet" href="../static/css/view_appliacation.css" />
    <title>SKILLFORGE ПРОСМОТОР ЗАЯВКИ</title>
</head>
<body>

<header class="topbar">
    <date class="realtimeLocal">LOCAL&nbsp /&nbsp <time class="realtimeTime">00:00:00</time></date>
    <h1 class="logo">SKILLFORGE</h1>
    <button class="back-btn" onclick="history.back()">← Назад</button>
</header>

<main class="layout">

    <section class="task-card">

        <div class="task-image">
            <img src="{{ task.image_url }}" alt="Обложка задачи: {{ task.title }}">
        </div>

        <div class="task-content">

            <h2 class="task-title">
                {{ task.title }}
            </h2>

            <div class="task-price">
                <span class="price-prefix"> ДО </span> {{ task.price }} РУБЛЕЙ
            </div>

            <div class="task-meta">
                <div>
                    <span class="meta-label">Сроки выполнения</span>
                    <span class="meta-value">{{ task.deadline }}</span>
                </div>
                <div>
                    <span class="meta-label">Место работы</span>
                    <span class="meta-value">{{ task.location }}</span>
                </div>
            </div>

            <div class="description">
                <h3>Описание задачи</h3>
                
                <div class="desc-text" style="white-space: pre-wrap; line-height: 1.5;">{{ task.description }}</div>
                
            </div>

        </div>

    </section>

    <aside class="response-card">

        <div class="response-header">
            <span class="response-title">Уже откликнулось:</span>
            <span class="response-badge" id="responses-count">{{ task.responses_count | default('0') }} людей</span>
        </div>

        <input
            type="text"
            class="price-input"
            id="offer-price"
            name="offer_price"
            placeholder="Введите свою цену за работу">

        <button
            class="apply-btn"
            hx-post="/api/respond/{{ task.id }}"
            hx-include="#offer-price"
            hx-target="#response-result"
            hx-swap="innerHTML">
            Откликнуться
        </button>

        <div id="response-result"></div>

    </aside>

</main>
  <script src="../static/js/realtime.js"></script>
</body>
</html>
