<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — SKILLFORGE</title>
    <link rel="stylesheet" href="../static/css/auth.css" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <main class="auth">
      <h1 class="auth__title">Регистрация</h1>
      <form
        class="auth__form"
        hx-post="/register"
        hx-target="#register-result"
        hx-swap="innerHTML"
      >
        <div class="auth__field">
          <label class="auth__label" for="name">Имя</label>
          <input
            class="auth__input"
            type="text"
            id="name"
            name="name"
            placeholder="Введите имя"
            required
          />
        </div>
        <div class="auth__field">
          <label class="auth__label" for="email">Почта</label>
          <input
            class="auth__input"
            type="email"
            id="email"
            name="email"
            placeholder="Введите почту"
            required
          />
        </div>
        <div class="auth__field">
          <label class="auth__label" for="password">Пароль</label>
          <input
            class="auth__input"
            type="password"
            id="password"
            name="password"
            placeholder="Придумайте пароль"
            required
          />
        </div>
        <div id="register-result" class="auth__result"></div>
        <div class="auth__actions">
          <button class="auth__submit" type="submit">Создать аккаунт</button>
          <button
            class="auth__social-btn"
            type="button"
            title="Зарегистрироваться через Яндекс"
          >
            <img
              src="../static/media/sistem-media/yandex.png"
              alt="Яндекс"
              class="auth__social-icon"
            />
          </button>
        </div>
      </form>
      <p class="auth__footer">
        <span class="auth__footer-text">Уже есть аккаунт?</span>
        <a class="auth__link" href="/login">Войти</a>
      </p>
    </main>
  </body>
</html>
