<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge Messenger</title>
    <link rel="stylesheet" href="../static/css/chat.css" />
    <link rel="stylesheet" href="../static/css/common.css" />
  </head>
  <body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="chat-app">
      <aside class="chat-sidebar">
        <div class="chat-sidebar__header">
          <input
            type="text"
            class="chat-sidebar__search"
            placeholder="Поиск..."
          />
        </div>
        <div class="chat-sidebar__list">
          {% for chat in chats %}
          <div
            class="chat-sidebar__item"
            hx-get="{% url 'load_chat' chat.id %}"
            hx-trigger="click"
            hx-target="#chat-messages-container"
            hx-swap="innerHTML"
          >
            <div class="chat-avatar">{{ chat.initials }}</div>
            <div class="chat-item__info">
              <div class="chat-item__header">
                <span class="chat-item__name">{{ chat.name }}</span>
              </div>
              <div class="chat-item__preview">Нажми, чтобы открыть</div>
            </div>
          </div>
          {% endfor %}
        </div>
      </aside>
      <main class="chat-main">
        <div id="chat-messages-container" class="chat-messages">
          <div style="text-align: center; margin-top: 50px; color: gray">
            Выберите чат для начала общения
          </div>
        </div>
        <form
          class="chat-input"
          hx-post="{% url 'send_message' %}"
          hx-target="#chat-messages-container"
          hx-swap="beforeend"
          hx-on::after-request="this.reset()"
        >
          <input type="hidden" name="chat_id" id="current-chat-id" value="" />
          <input
            type="text"
            name="text"
            class="chat-input__field"
            placeholder="Написать сообщение..."
            required
          />
          <button type="submit" class="chat-input__send">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </form>
      </main>
    </div>
  </body>
</html>
